name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Generate iOS platform
        run: flutter create . --platforms=ios

      - name: Add iOS permissions
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string '用于拍摄绘本图片'" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string '用于选择绘本图片'" ios/Runner/Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r storybook.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: storybook-unsigned-ipa-${{ github.run_number }}
          path: storybook.ipa
          retention-days: 30
